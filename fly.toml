# Fly.io deployment config — free tier (3 shared-CPU VMs + 3 GB persistent volume)
# Deploy: fly launch --no-deploy && fly secrets set SECRET_KEY=... && fly deploy

app = "uplinx-meta-manager"
primary_region = "ams"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "uplinx_data"
  destination = "/app/data"

[[statics]]
  guest_path = "/app/frontend"
  url_prefix = "/frontend"
